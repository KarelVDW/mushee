# Temporary override: the default 5432/27017 host ports are occupied by
# another project, so expose mushee's databases on alternate ports.
# Usage: docker compose -f docker-compose.yml -f docker-compose.altports.yml up -d
services:
  postgres:
    ports: !override
      - '5532:5432'
  mongo:
    ports: !override
      - '27117:27017'
