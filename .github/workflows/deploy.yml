# Build the three backend images, push them to Artifact Registry with the git
# SHA as an immutable tag, and roll the matching overlay. Pushes to the
# `production` branch deploy the production overlay (namespace mushee),
# pushes to `staging` deploy the staging overlay (namespace mushee-staging);
# workflow_dispatch remains as a manual escape hatch for either.
#
# One-time GCP setup: a workload-identity federation pool for GitHub OIDC and
# a deployer service account with roles/artifactregistry.writer +
# roles/container.developer — commands in deploy/k8s/overlays/production/README.md
# (the staging overlay reuses the same deployer; see its README).
name: Deploy

on:
  push:
    branches: [production, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Overlay to deploy'
        type: choice
        options: [production, staging]
        default: staging
      apply:
        description: 'Apply the overlay to the cluster after pushing'
        type: boolean
        default: true

# One deploy per environment at a time; queue (never cancel) a running apply.
concurrency:
  group: deploy-${{ github.event_name == 'push' && github.ref_name || inputs.environment }}
  cancel-in-progress: false

env:
  PROJECT_ID: sheemu-prod
  REGION: europe-west1
  CLUSTER: mushee-prod
  REGISTRY: europe-west1-docker.pkg.dev
  WIF_PROVIDER: projects/940791749471/locations/global/workloadIdentityPools/github/providers/github
  WIF_SERVICE_ACCOUNT: github-deployer@sheemu-prod.iam.gserviceaccount.com
  # Branch name and overlay/environment name are deliberately identical.
  DEPLOY_ENV: ${{ github.event_name == 'push' && github.ref_name || inputs.environment }}

permissions:
  contents: read
  id-token: write # OIDC token for workload identity federation

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: apps/api/Dockerfile
          - image: crepe-inference
            dockerfile: apps/inference-crepe/Dockerfile
          - image: basic-pitch-inference
            dockerfile: apps/inference-basic-pitch/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/mushee/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  deploy:
    needs: build-push
    if: ${{ github.event_name == 'push' || inputs.apply }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'push' && github.ref_name || inputs.environment }}
      url: ${{ (github.event_name == 'push' && github.ref_name || inputs.environment) == 'production' && 'https://api.sheemu.com' || 'https://api.staging.sheemu.com' }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}
      - name: Stamp immutable image tags and apply
        working-directory: deploy/k8s/overlays/${{ env.DEPLOY_ENV }}
        run: |
          for img in api crepe-inference basic-pitch-inference; do
            kustomize edit set image \
              "mushee/$img=$REGISTRY/$PROJECT_ID/mushee/$img:$GITHUB_SHA"
          done
          kubectl apply -k .
      - name: Wait for rollouts
        run: |
          ns=$([ "$DEPLOY_ENV" = production ] && echo mushee || echo mushee-staging)
          for d in api crepe-inference basic-pitch-inference; do
            kubectl rollout status "deploy/$d" -n "$ns" --timeout=10m
          done
