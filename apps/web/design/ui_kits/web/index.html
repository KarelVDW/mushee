<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sheemu — UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--color-surface); min-height: 100vh; }
  #root { display: flex; flex-direction: column; min-height: 100vh; }
  /* Tab bar that scrolls with the kit, persists across screens */
  .kit-tabs {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border-radius: 9999px;
    box-shadow: 3px 3px 0 0 var(--color-secondary-container), 0 0 24px 0 rgba(45,47,47,0.06);
    padding: 6px;
    display: flex; gap: 4px; flex-wrap: wrap; max-width: calc(100vw - 32px); justify-content: center;
  }
  .kit-tabs button {
    background: transparent; border: 0;
    padding: 8px 14px; border-radius: 9999px; cursor: pointer;
    font: 600 12px/1 var(--font-label); color: var(--color-on-surface);
    white-space: nowrap; flex-shrink: 0;
  }
  .kit-tabs button.active {
    background: var(--color-primary-container); color: var(--color-on-primary-container);
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Brand.jsx"></script>
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Buttons.jsx"></script>
<script type="text/babel" src="Inputs.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="CreateScoreDialog.jsx"></script>
<script type="text/babel" src="Library.jsx"></script>
<script type="text/babel" src="Editor.jsx"></script>
<script type="text/babel" src="Auth.jsx"></script>
<script type="text/babel" src="Landing.jsx"></script>
<script type="text/babel" src="Onboarding.jsx"></script>
<script type="text/babel" src="Settings.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [screen, setScreen] = useState('landing');
  const [authMode, setAuthMode] = useState('signin');
  const [scores, setScores] = useState(SAMPLE_SCORES);
  const [openScore, setOpenScore] = useState(null);
  const [createOpen, setCreateOpen] = useState(false);
  // Recording quota — in production this lives server-side, keyed on user+day.
  // We seed Sketch with some usage so the meter shows interesting state on first load.
  const [planId, setPlanId] = useState('free');
  const [recUsedSec, setRecUsedSec] = useState(18);

  const handleCreate = (title, instrument) => {
    const s = { id: 'new-' + Date.now(), title, instrument, created: 'Just now', updated: 'Just now' };
    setScores([s, ...scores]);
    setCreateOpen(false);
    setOpenScore(s);
    setScreen('editor');
  };

  return (
    <>
      {screen === 'landing' && (
        <Landing
          onSignIn={() => { setAuthMode('signin'); setScreen('auth'); }}
          onGetStarted={() => { setAuthMode('signup'); setScreen('auth'); }} />
      )}

      {screen === 'auth' && (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 32 }}>
          {authMode === 'reset' ? (
            <PasswordResetCard onBackToSignIn={() => setAuthMode('signin')} />
          ) : (
            <AuthCard mode={authMode} onSwitch={setAuthMode}
              onSubmit={() => setScreen(authMode === 'signup' ? 'onboarding' : 'library')} />
          )}
        </div>
      )}

      {screen === 'onboarding' && (
        <Onboarding
          onComplete={() => setScreen('library')}
          onSkip={() => setScreen('library')} />
      )}

      {screen === 'library' && (
        <>
          <TopNav active="Library" onCreate={() => setCreateOpen(true)}
            onNav={(n) => setScreen(n === 'editor' ? 'editor' : n === 'settings' ? 'settings' : 'library')}
            onSignOut={() => setScreen('landing')} />
          <Library scores={scores}
            onOpen={(s) => { setOpenScore(s); setScreen('editor'); }}
            onCreate={() => setCreateOpen(true)}
            onDelete={(s) => setScores(scores.filter(x => x.id !== s.id))} />
          <Footer />
        </>
      )}

      {screen === 'editor' && (
        <Editor score={openScore || scores[0]}
          onBack={() => setScreen('library')}
          onSettings={() => setScreen('settings')}
          planId={planId}
          recUsedSec={recUsedSec}
          onRecUsedSecChange={setRecUsedSec}
          onUpgrade={() => setScreen('settings')} />
      )}

      {screen === 'settings' && (
        <>
          <TopNav active="Library"
            onCreate={() => setCreateOpen(true)}
            onNav={(n) => setScreen(n === 'editor' ? 'editor' : n === 'library' ? 'library' : 'settings')}
            onSignOut={() => setScreen('landing')} />
          <Settings
            onSave={() => {}}
            onSignOut={() => setScreen('landing')}
            recUsedSec={recUsedSec}
            onResetUsage={() => setRecUsedSec(0)}
            planId={planId}
            onPlanChange={setPlanId} />
          <Footer />
        </>
      )}

      {createOpen && (
        <CreateScoreDialog
          onCancel={() => setCreateOpen(false)}
          onCreate={handleCreate} />
      )}

      <div className="kit-tabs">
        {[
          ['landing',    'Landing'],
          ['auth',       'Sign in / Sign up'],
          ['reset',      'Password reset'],
          ['onboarding', 'Onboarding'],
          ['library',    'Score library'],
          ['editor',     'Editor'],
          ['settings',   'Settings'],
        ].map(([k, label]) => (
          <button key={k} className={(k === 'reset' ? (screen === 'auth' && authMode === 'reset') : screen === k && !(k === 'auth' && authMode === 'reset')) ? 'active' : ''} onClick={() => {
            if (k === 'editor' && !openScore) setOpenScore(scores[0]);
            if (k === 'reset') { setAuthMode('reset'); setScreen('auth'); return; }
            if (k === 'auth' && authMode === 'reset') setAuthMode('signin');
            setScreen(k);
          }}>{label}</button>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
