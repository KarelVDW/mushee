<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chips — instrument & genre</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  .card { width: 700px; box-sizing: border-box; background: var(--color-surface-container-lowest); padding: 24px 28px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
  .chip { border-radius: 9999px; padding: 6px 14px; font: 700 11px/1 var(--font-label); letter-spacing: 0.04em; }
  .default { background: var(--color-surface-container); color: var(--color-on-surface); }
  .hover { background: var(--color-surface-container-high); color: var(--color-on-surface); }
  .active { background: var(--color-secondary-soft); color: var(--color-on-secondary-soft); }
</style>
</head>
<body>
  <div class="card">
    <span class="chip active">Piano</span>
    <span class="chip default">Violin</span>
    <span class="chip default">Cello</span>
    <span class="chip default">Flute</span>
    <span class="chip hover">Oboe</span>
    <span class="chip default">Bassoon</span>
    <span class="chip default">Trombone</span>
    <span class="chip default">Tuba</span>
    <span class="chip default">Erhu</span>
    <span class="chip default">Dizi Flute</span>
    <span class="chip default">Shakuhachi</span>
    <span class="chip default">Pan Flute</span>
    <span class="chip default">Ocarina</span>
    <span class="chip default">Bagpipe</span>
    <span class="chip default">Recorder</span>
    <span class="chip default">Tin Whistle</span>
  </div>
</body>
</html>
