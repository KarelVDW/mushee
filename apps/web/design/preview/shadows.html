<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Shadows — atmospheric & magenta-offset</title>
        <link rel="stylesheet" href="../colors_and_type.css" />
        <style>
            html,
            body {
                margin: 0;
            }
            .card {
                width: 700px;
                box-sizing: border-box;
                background: var(--color-surface);
                padding: 32px 28px;
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 22px;
            }
            .swatch {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .box {
                width: 110px;
                height: 80px;
                background: var(--color-surface-container-lowest);
                border-radius: 8px;
            }
            .pill {
                width: 110px;
                height: 38px;
                background: var(--color-primary-container);
                border-radius: 9999px;
            }
            .name {
                font: var(--type-label-md);
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--color-on-surface);
            }
            .v {
                font: 500 10px/1.3 var(--font-mono);
                color: var(--color-on-surface-variant);
                text-align: center;
            }
            .tonal {
                box-shadow: 0 0 24px 0 rgba(45, 47, 47, 0.06);
            }
            .editorial {
                box-shadow: 0 0 19px 0 rgba(45, 47, 47, 0.06);
            }
            .offset3 {
                box-shadow: 3px 3px 0 0 #ff2079;
            }
            .offset5 {
                box-shadow: 5px 5px 0 0 #ff2079;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="swatch">
                <div class="box tonal"></div>
                <span class="name">tonal</span><span class="v">0 0 24 6%</span>
            </div>
            <div class="swatch">
                <div class="box editorial"></div>
                <span class="name">editorial</span><span class="v">0 0 19 6%</span>
            </div>
            <div class="swatch">
                <div class="pill offset3"></div>
                <span class="name">offset-3</span><span class="v">3 3 0 magenta</span>
            </div>
            <div class="swatch">
                <div class="pill offset5"></div>
                <span class="name">offset-5</span><span class="v">5 5 0 (hover)</span>
            </div>
        </div>
    </body>
</html>
