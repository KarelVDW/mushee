<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Card surface treatment</title>
        <link rel="stylesheet" href="../colors_and_type.css" />
        <style>
            html,
            body {
                margin: 0;
                background: var(--color-surface);
            }
            .frame {
                width: 700px;
                box-sizing: border-box;
                background: var(--color-surface);
                padding: 28px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 18px;
            }
            .card {
                background: var(--color-surface-container-lowest);
                border-radius: 8px;
                padding: 16px;
                box-shadow: 0 0 24px 0 rgba(45, 47, 47, 0.06);
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .glass {
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(12px);
                border-radius: 12px;
                padding: 16px;
                box-shadow: 0 0 24px 0 rgba(45, 47, 47, 0.06);
            }
            .ttl {
                font: 700 14px/1 var(--font-display);
                color: var(--color-on-surface);
            }
            .lbl {
                font: 700 9.6px/1 var(--font-label);
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--color-on-surface-variant);
            }
            .body {
                font: 400 13px/1.4 var(--font-body);
                color: var(--color-on-surface-variant);
            }
            .footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 4px;
            }
            .pill {
                background: var(--color-secondary-container);
                color: var(--color-on-secondary-container);
                border-radius: 9999px;
                padding: 4px 10px;
                font: 700 9px/1 var(--font-label);
                letter-spacing: 0.18em;
                text-transform: uppercase;
            }
        </style>
    </head>
    <body>
        <div class="frame">
            <div class="card">
                <span class="lbl">Score</span>
                <span class="ttl">Allegro in C Minor</span>
                <span class="body">Updated 2h ago · 32 measures</span>
                <div class="footer"><span class="lbl">Piano</span><span class="pill">Solo</span></div>
            </div>
            <div class="glass">
                <span class="lbl">Glass tool-dock</span>
                <div class="ttl" style="margin-top: 6px">120 BPM</div>
                <span class="body">surface_lowest @ 85% · blur 12px</span>
            </div>
        </div>
    </body>
</html>
