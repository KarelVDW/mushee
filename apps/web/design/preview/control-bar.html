<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Score editor control bar</title>
        <link rel="stylesheet" href="../colors_and_type.css" />
        <style>
            html,
            body {
                margin: 0;
                background: var(--color-surface);
            }
            .card {
                width: 1000px;
                box-sizing: border-box;
                background: var(--color-surface-container-lowest);
                box-shadow: 0 0 24px 0 rgba(45, 47, 47, 0.06);
                border-radius: 12px;
                padding: 14px 24px;
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                align-items: center;
                gap: 16px;
            }

            /* Segmented pill track (durations / accidentals) */
            .seg {
                display: inline-flex;
                padding: 3px;
                border-radius: 9999px;
                background: var(--color-surface-container-low);
            }
            .seg button {
                background: transparent;
                color: var(--color-on-surface-variant);
                border: 0;
                padding: 6px 12px;
                cursor: pointer;
                border-radius: 9999px;
                min-width: 34px;
                font: 500 16px/1 var(--font-label);
            }
            .seg button.serif {
                font-family: serif;
                font-size: 18px;
            }
            .seg button.active {
                background: var(--color-primary-container);
                color: var(--color-on-primary-container);
                font-weight: 600;
            }

            /* Chip toggle (dot · tie) */
            .chip {
                background: var(--color-surface-container-low);
                color: var(--color-on-surface);
                border: 0;
                border-radius: 9999px;
                padding: 7px 14px;
                font: 600 13px/1 var(--font-label);
                cursor: pointer;
                min-height: 32px;
            }
            .chip.active {
                background: var(--color-primary-container);
                color: var(--color-on-primary-container);
            }

            /* Transport — center cluster */
            .transport {
                display: flex;
                align-items: center;
                gap: 14px;
            }

            .satellite {
                width: 36px;
                height: 36px;
                border-radius: 9999px;
                background: var(--color-surface-container-low);
                color: var(--color-on-surface-variant);
                border: 0;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
            }
            .satellite.active {
                color: var(--color-primary);
            }
            .satellite .material-symbols-outlined {
                font-size: 16px;
            }

            /* Concentric play */
            .play {
                width: 52px;
                height: 52px;
                border-radius: 9999px;
                background: var(--color-surface-container-lowest);
                border: 3px solid var(--color-primary-container);
                color: var(--color-primary);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                padding: 0;
            }
            .play.active {
                background: var(--color-primary-container);
                color: var(--color-on-primary-container);
            }
            .play .material-symbols-outlined {
                font-size: 26px;
            }

            /* Concentric record — headline */
            .record {
                width: 72px;
                height: 72px;
                border-radius: 9999px;
                background: var(--color-surface-container-lowest);
                border: 3px solid var(--color-error-container);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                padding: 0;
            }
            .record .core {
                width: 30px;
                height: 30px;
                border-radius: 9999px;
                background: var(--color-error-container);
                box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.18);
            }
            .record.active {
                background: var(--color-error);
                border-color: var(--color-error);
            }
            .record.active .core {
                background: var(--color-on-error);
                box-shadow: none;
            }

            /* Tempo readout (right) */
            .tempo {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                font: 600 11px/1 var(--font-label);
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--color-primary);
            }
        </style>
    </head>
    <body>
        <div class="card">
            <!-- LEFT — note input -->
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0">
                <div class="seg" role="group" aria-label="Note duration">
                    <button class="serif">𝅝</button>
                    <button class="serif">𝅗𝅥</button>
                    <button class="serif active">𝅘𝅥</button>
                    <button class="serif">𝅘𝅥𝅮</button>
                    <button class="serif">𝅘𝅥𝅯</button>
                </div>
                <button class="chip" aria-label="Dotted">·</button>
                <div class="seg" role="group" aria-label="Accidental">
                    <button>♮</button>
                    <button>♭</button>
                    <button class="active">♯</button>
                </div>
                <button class="chip">Tie</button>
            </div>

            <!-- CENTER — transport -->
            <div class="transport">
                <button class="satellite" aria-label="Stop">
                    <span class="material-symbols-outlined">stop</span>
                </button>
                <button class="play" aria-label="Play">
                    <span class="material-symbols-outlined">play_arrow</span>
                </button>
                <button class="record" aria-label="Record">
                    <span class="core"></span>
                </button>
                <button class="satellite active" aria-label="Metronome">
                    <span class="material-symbols-outlined">graphic_eq</span>
                </button>
            </div>

            <!-- RIGHT — tempo -->
            <div class="tempo">♩ = 120 bpm</div>
        </div>
    </body>
</html>
