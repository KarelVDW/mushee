# basic-pitch forward-pass service. Only the very-high register routes here, so
# it stays small. Image is built from apps/inference-basic-pitch/Dockerfile.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-pitch-inference
  labels: { app: basic-pitch-inference }
spec:
  replicas: 1
  selector:
    matchLabels: { app: basic-pitch-inference }
  template:
    metadata:
      labels: { app: basic-pitch-inference }
    spec:
      containers:
        - name: basic-pitch-inference
          image: mushee/basic-pitch-inference:latest # build & push from apps/inference-basic-pitch/Dockerfile
          imagePullPolicy: IfNotPresent # use a locally-built image if present
          ports:
            - containerPort: 50052
          env:
            - { name: PORT, value: '50052' }
            - { name: GRPC_MAX_WORKERS, value: '8' }
          resources:
            requests: { cpu: '500m', memory: 1Gi }
            limits: { cpu: '2', memory: 2Gi }
          startupProbe:
            tcpSocket: { port: 50052 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 50052 }
            periodSeconds: 15
          readinessProbe:
            tcpSocket: { port: 50052 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: basic-pitch-inference
spec:
  selector: { app: basic-pitch-inference }
  ports:
    - port: 50052
      targetPort: 50052
      name: grpc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: basic-pitch-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: basic-pitch-inference
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
