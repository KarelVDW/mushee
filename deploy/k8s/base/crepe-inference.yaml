# CREPE forward-pass service. High-volume (most registers route here), so it
# scales wider than basic-pitch. Image is built from apps/inference-crepe/Dockerfile.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crepe-inference
  labels: { app: crepe-inference }
spec:
  replicas: 2
  selector:
    matchLabels: { app: crepe-inference }
  template:
    metadata:
      labels: { app: crepe-inference }
    spec:
      containers:
        - name: crepe-inference
          image: mushee/crepe-inference:latest # build & push from apps/inference-crepe/Dockerfile
          imagePullPolicy: Always # local overlay patches this back for locally-built images
          ports:
            - containerPort: 50051
          env:
            - { name: PORT, value: '50051' }
            - { name: GRPC_MAX_WORKERS, value: '8' }
          resources:
            requests: { cpu: '500m', memory: 1Gi }
            limits: { cpu: '2', memory: 2Gi }
          # Model load takes a while; cover it with a startup probe, then liveness.
          startupProbe:
            tcpSocket: { port: 50051 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 50051 }
            periodSeconds: 15
          readinessProbe:
            tcpSocket: { port: 50051 }
            periodSeconds: 10
      # --- GPU variant (Phase 5): use a CUDA image + request a GPU + land on GPU nodes.
      # nodeSelector: { cloud.google.com/gke-accelerator: nvidia-tesla-t4 }
      # (and add resources.limits["nvidia.com/gpu"]: 1)
---
apiVersion: v1
kind: Service
metadata:
  name: crepe-inference
spec:
  selector: { app: crepe-inference }
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crepe-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crepe-inference
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
