# NestJS API. Runs in remote-inference mode: it points at the two per-model
# services and does no inference itself, so its event loop stays free. DB/auth
# secrets come from existing Secrets/ConfigMaps (referenced below as a stub).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: { app: api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: mushee/api:latest # build & push from apps/api/Dockerfile
          imagePullPolicy: IfNotPresent # use a locally-built image if present
          ports:
            - containerPort: 3000
          env:
            - { name: PORT, value: '3000' }
            - { name: CREPE_INFERENCE_URL, value: 'crepe-inference:50051' }
            - { name: BASIC_PITCH_INFERENCE_URL, value: 'basic-pitch-inference:50052' }
          # DB + auth + mail config from the cluster's existing secret/configmap.
          envFrom:
            - secretRef: { name: api-secrets } # POSTGRES_*, auth, SendGrid, etc.
          resources:
            requests: { cpu: '250m', memory: 256Mi }
            limits: { cpu: '1', memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3000 }
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: { app: api }
  ports:
    - port: 80
      targetPort: 3000
      name: http
