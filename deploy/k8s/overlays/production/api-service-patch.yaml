# Container-native load balancing: the L7 LB targets pod NEGs directly (one
# proxy hop, matching TRUST_PROXY=1) and uses the BackendConfig above for the
# /health check and the long WebSocket timeout.
apiVersion: v1
kind: Service
metadata:
  name: api
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "api-backend"}'
