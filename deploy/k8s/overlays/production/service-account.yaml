# Workload identity: the API authenticates to GCS as this Google service
# account via Application Default Credentials — no key files anywhere.
# One-time GCP side (see README.md): create mushee-api@PROJECT_ID, grant it
# roles/storage.objectAdmin on the bucket, and bind the KSA↔GSA link.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api
  annotations:
    iam.gke.io/gcp-service-account: mushee-api@PROJECT_ID.iam.gserviceaccount.com
