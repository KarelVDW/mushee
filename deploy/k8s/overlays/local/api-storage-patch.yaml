# Mount the local storage PVC into the API pods at the path RCLONE_REMOTE
# points to (see secret.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      containers:
        - name: api
          volumeMounts:
            - name: storage
              mountPath: /data/storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: api-storage
