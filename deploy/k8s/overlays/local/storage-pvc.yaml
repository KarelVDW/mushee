# LOCAL-ONLY blob storage: a hostpath-provisioned volume shared by the API
# replicas (fine on Docker Desktop's single node). Real deployments use Google
# Cloud Storage instead — see STORAGE_DRIVER in secret.yaml.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-storage
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
