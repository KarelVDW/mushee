# LOCAL-ONLY Postgres for testing the stack on Docker Desktop k8s. Ephemeral
# (emptyDir) — not for production; real envs use a managed DB. Matches the
# credentials in secret.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels: { app: postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_USER, value: mushee }
            - { name: POSTGRES_PASSWORD, value: mushee }
            - { name: POSTGRES_DB, value: mushee }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ['pg_isready', '-U', 'mushee'] }
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
