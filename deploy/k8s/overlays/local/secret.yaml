# LOCAL-ONLY test secret — dummy values, never use in a real cluster. Provides
# the DB + auth env the API reads at boot (see envFrom: api-secrets in api.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
type: Opaque
stringData:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: '5432'
  POSTGRES_USER: mushee
  POSTGRES_PASSWORD: mushee
  POSTGRES_DB: mushee
  BETTER_AUTH_SECRET: local-test-secret-not-for-prod
  BETTER_AUTH_URL: http://localhost:3000
  # Let a host-run web dev server (:3200) talk to this API.
  CORS_ORIGIN: http://localhost:3200
  TRUSTED_ORIGINS: http://localhost:3200
  # Volume-backed local blob storage (see storage-pvc.yaml). Real clusters set
  # STORAGE_DRIVER=gcs + GCS_BUCKET (auth via workload identity) instead.
  STORAGE_DRIVER: local
  STORAGE_LOCAL_DIR: /data/storage
  # Seed demo accounts on boot (idempotent, advisory-locked across replicas).
  SEED_DEMO_DATA: 'true'
  # Web app base URL — Polar checkout redirects and email links point here.
  WEB_APP_URL: http://localhost:3200
  # Closed beta off locally; flip to 'true' (plus NEXT_PUBLIC_BETA_MODE on the
  # web build) to exercise the waitlist/approval flow. Polar stays unset here,
  # so billing endpoints answer 503 and the UI hides paid actions.
  BETA_MODE: 'false'
  # ADMIN_EMAILS: you@example.com
  # Admin console (apps/admin): the console holds the same secret and forwards
  # it server-side; unset would 503 the /admin API.
  ADMIN_SECRET: local-admin-secret-not-for-prod
  ADMIN_APP_URL: http://localhost:3500
