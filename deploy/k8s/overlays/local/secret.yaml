# LOCAL-ONLY test secret — dummy values, never use in a real cluster. Provides
# the DB + auth env the API reads at boot (see envFrom: api-secrets in api.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
type: Opaque
stringData:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: '5432'
  POSTGRES_USER: mushee
  POSTGRES_PASSWORD: mushee
  POSTGRES_DB: mushee
  BETTER_AUTH_SECRET: local-test-secret-not-for-prod
  BETTER_AUTH_URL: http://localhost:3000
  # Let a host-run web dev server (:3200) talk to this API.
  CORS_ORIGIN: http://localhost:3200
  TRUSTED_ORIGINS: http://localhost:3200
  # Volume-backed local MusicXML storage (see storage-pvc.yaml).
  RCLONE_REMOTE: /data/storage
  # Seed demo accounts on boot (idempotent, advisory-locked across replicas).
  SEED_DEMO_DATA: 'true'
