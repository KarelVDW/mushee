# Container-native load balancing, same as production: the L7 LB targets pod
# NEGs directly and uses the BackendConfig for the /health check and the long
# WebSocket timeout.
apiVersion: v1
kind: Service
metadata:
  name: api
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "api-backend"}'
