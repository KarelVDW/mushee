# Workload identity, staging flavour: its own GSA so staging can only touch
# the staging bucket — a bug here can never write into production storage.
# One-time GCP side (see README.md): create mushee-api-staging@sheemu-prod,
# grant it roles/storage.objectAdmin on gs://sheemu-staging-storage, and bind
# the KSA↔GSA link for [mushee-staging/api].
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api
  annotations:
    iam.gke.io/gcp-service-account: mushee-api-staging@sheemu-prod.iam.gserviceaccount.com
