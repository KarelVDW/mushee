# HTTPS entry point for api.staging.solkey.io — same shape as production
# (global L7 LB + Google-managed cert). Needs a reserved global static IP named
# `mushee-api-staging-ip` (see README.md) and the api.staging.solkey.io A
# record pointing at it — the ManagedCertificate only provisions once DNS
# resolves.
# Named per-domain: a ManagedCertificate's underlying SslCertificate can't be
# updated in place while the LB proxy references it (delete/recreate deadlocks
# with resourceInUseByAnotherResource). To change domains, add a new cert under
# a new name, point the annotation at it, then delete the old resource.
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: api-cert-solkey
spec:
  domains:
    - api.staging.solkey.io
---
# Plain-HTTP requests get a 301 to HTTPS at the load balancer.
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: api-frontend
spec:
  redirectToHttps:
    enabled: true
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: api-backend
spec:
  # Recording WebSockets are long-lived: RECORDING_MAX_SECONDS defaults to
  # 3600, and the LB timeout bounds the whole connection, so give it 2 h.
  timeoutSec: 7200
  # The LB health-checks pods directly (container-native NEGs) — point it at
  # the API's real health endpoint instead of the default `/`.
  healthCheck:
    type: HTTP
    requestPath: /health
    port: 3000
  # Match terminationGracePeriodSeconds so draining pods can finish takes.
  connectionDraining:
    drainingTimeoutSec: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.global-static-ip-name: mushee-api-staging-ip
    networking.gke.io/managed-certificates: api-cert-solkey
    networking.gke.io/v1beta1.FrontendConfig: api-frontend
spec:
  rules:
    - host: api.staging.solkey.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
